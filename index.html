<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS (Próprio) -->
    <link type="text/css" rel="stylesheet" href="css/style.css">
    
    <!-- Link das fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Hepta+Slab:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <title>Carrinho de Compras em JavaScript</title>

</head>
<body>
   <!-- Seção de modelos de produtos  -->
    <div class="models">
        <!-- Estrutura de um único modelo de produto -->
         <div class="models-item">
            <a href="">
                <div class="models-item--img">
                    <img src="#" alt="">
                </div>
                <div class="models-item--img">+</div>
            </a>
            <div class="models-item--prince">R$ --</div>
            <div class="models-item--name">--</div>
            <div class="models-item--desc">--</div>
         </div>
         <!-- Estrutura de um item no carrinho de compras -->
          <div class="cart--item">
            <img src="#" alt="">
            <div class="cart--item--nome">--</div>
            <div class="cart--item--qtarea">
                <button class="cart--item--qtmenos">-</button>
                <div class="cart--item--qt">1</div>
                <button class="cart--item--qtmais">+</button>
            </div>
          </div>
    </div>

    <!-- Cabeçalho da página-->
     <header>
        <!-- ícone de carrinho de compras com computador -->
         <div class="menu-openner">
            <span>0</span>
            <span class="material-icons">
                shopping_cart
            </span>
         </div>
     </header>

     <!-- Corpo principal da página  -->
      <main>
        <h1>Modelos</h1>
        <div class="models-area"></div>
      </main>

      <!-- Barra lateral para exibição -->
       <aside>
        <div class="cart--area">
            <!-- Botão para fechar a barra lateral do carrinho -->
             <div class="menu-closer">
                <span class="material-icons"> close</span>
             </div>

             <h1>Seus modelos</h1>

             <!-- Exibição dos itens no carrinho -->
              <div class="cart"></div>
              <!-- Detalhes do carrinho, incluindo subtotal, desconto, e total -->

              <div class="cart-details">
                <div></div>
              </div>
        </div>
       </aside>


    <!-- Digitar aqui o código index.html -->






    <!-- JS com os modelos (Detalhes do produto) -->
    <script type="text/javascript" src="js/models.js"></script>

    <!-- JS (Ações da página) -->
    <script type="text/javascript" src="js/script.js"></script>


</body>
</html>
